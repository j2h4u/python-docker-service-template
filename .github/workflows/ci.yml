name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".planning/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_LINK_MODE: hardlink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Static quality gate
        run: just check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: just unit

  crap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: CRAP gate
        run: just crap-check

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: python-docker-service-template:ci

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality, test, crap, docker-build]
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
